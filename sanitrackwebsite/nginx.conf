server {
    listen 80;
    server_name sanitrackwebsite;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        try_files /index.html =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public";
    }
}
